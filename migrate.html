<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가계부 데이터 마이그레이션 (1회용)</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 24px auto; padding: 0 16px; color: #222; }
    h1 { font-size: 20px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; margin: 14px 0; }
    label { display: block; font-size: 13px; color: #555; margin: 8px 0 4px; }
    input { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
    .row { display: flex; gap: 10px; }
    .row > div { flex: 1; }
    button { margin-top: 14px; padding: 11px 18px; border: none; border-radius: 999px; background: #2563EB; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: .5; cursor: default; }
    pre { background: #0f172a; color: #cbd5e1; padding: 12px; border-radius: 10px; font-size: 12.5px; white-space: pre-wrap; word-break: break-all; max-height: 340px; overflow: auto; }
    .warn { background: #FEF3C7; border: 1px solid #FCD34D; border-radius: 10px; padding: 12px; font-size: 13px; }
  </style>
</head>
<body>
  <h1>📦 가계부 데이터 마이그레이션 (1회용)</h1>
  <div class="warn">
    <b>순서</b><br>
    ① Firebase 콘솔에 <code>firestore.rules.migration</code> 규칙을 게시 →
    ② 이 페이지를 <b>앱과 같은 주소(origin)</b>에서 열어 실행 →
    ③ 로그에서 복사 건수 확인 →
    ④ 콘솔에 <code>firestore.rules</code>(최종본) 규칙을 다시 게시.
  </div>

  <div class="card">
    <label>가족 코드(hid) — 이 코드 아래로 데이터를 복사합니다</label>
    <input id="hid" />
    <button id="run">마이그레이션 시작</button>
  </div>

  <pre id="log">준비됨. '마이그레이션 시작'을 누르세요.</pre>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
    import {
      getFirestore, doc, getDoc, setDoc, collection, getDocs,
    } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";
    import { firebaseConfig } from "./src/firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const logEl = document.getElementById("log");
    const log = (m) => { logEl.textContent += m + "\n"; logEl.scrollTop = logEl.scrollHeight; };

    // 앱과 같은 origin이면 localStorage 가족코드가 자동으로 채워집니다.
    const KEY = "hj_household";
    document.getElementById("hid").value =
      new URLSearchParams(location.search).get("h") || localStorage.getItem(KEY) || "";

    document.getElementById("run").addEventListener("click", async () => {
      const btn = document.getElementById("run");
      const hid = document.getElementById("hid").value.trim();
      if (!hid) { alert("가족 코드(hid)를 입력하세요."); return; }
      btn.disabled = true;
      try {
        log("🔑 익명 로그인 중...");
        await signInAnonymously(auth);
        log("✅ 로그인 완료. 대상 가족코드: " + hid);

        log("🔍 옛 경로(budgets) 조회 중...");
        const snap = await getDocs(collection(db, "budgets"));
        log(`📚 문서 ${snap.size}개 발견. 복사 시작...`);

        let copied = 0, skipped = 0, empty = 0;
        for (const oldSnap of snap.docs) {
          const id = oldSnap.id; // "년_월(0~11)"
          const data = oldSnap.data();
          const hasData = (data.entries && data.entries.length) || data.budget;
          if (!hasData) { empty++; continue; }

          const target = doc(db, "households", hid, "budgets", id);
          const tSnap = await getDoc(target);
          if (tSnap.exists()) {
            skipped++;
            log(`⏭️  ${id} — 대상에 이미 있음, 건너뜀`);
            continue;
          }
          await setDoc(target, {
            entries: data.entries || [],
            budget: data.budget || 0,
          });
          copied++;
          log(`📄 ${id} — 내역 ${(data.entries || []).length}건 복사`);
        }

        // 학습형 분류(merchantMap) 복사
        const mapSnap = await getDoc(doc(db, "meta", "merchantMap"));
        if (mapSnap.exists()) {
          const target = doc(db, "households", hid, "meta", "merchantMap");
          const tSnap = await getDoc(target);
          if (tSnap.exists()) {
            log("⏭️  merchantMap — 대상에 이미 있음, 건너뜀");
          } else {
            await setDoc(target, mapSnap.data());
            log("🏷️  merchantMap 복사 완료");
          }
        }

        log(`\n🎉 완료 — 복사 ${copied}개월 / 건너뜀 ${skipped}개월 / 데이터 없음 ${empty}개월`);
        log("이제 Firebase 콘솔에 firestore.rules(최종본)를 다시 게시하세요.");
      } catch (e) {
        console.error(e);
        log("❌ 오류: " + (e && e.message ? e.message : e));
        log("규칙(firestore.rules.migration)이 게시됐는지 확인하세요.");
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
